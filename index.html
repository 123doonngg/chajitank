<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  user-select: none;
}
#game-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
#header {
  display: flex;
  justify-content: space-between;
  width: 780px;
  color: #fff;
  font-size: 18px;
  padding: 5px 10px;
  background: #1a1a2e;
  border: 2px solid #444;
  border-radius: 5px;
}
#header .label { color: #aaa; margin-right: 5px; }
#header .value { color: #ffcc00; font-weight: bold; }
#header .lives { color: #ff4444; }
canvas {
  border: 3px solid #555;
  background: #111;
  image-rendering: pixelated;
}
#controls-info {
  color: #888;
  font-size: 13px;
  text-align: center;
}
#controls-info span { color: #ffcc00; }
#game-over-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}
#game-over-overlay.show { display: flex; }
#game-over-overlay h1 {
  color: #ff4444;
  font-size: 48px;
  margin-bottom: 10px;
  text-shadow: 0 0 20px #f00;
}
#game-over-overlay .score {
  color: #ffcc00;
  font-size: 24px;
  margin-bottom: 20px;
}
#game-over-overlay button {
  padding: 12px 40px;
  font-size: 20px;
  font-family: inherit;
  background: #ff4444;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.2s;
}
#game-over-overlay button:hover { background: #ff6666; }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="header">
    <div><span class="label">🏆 得分</span><span class="value" id="score-display">0</span></div>
    <div><span class="label">🎯 关卡</span><span class="value" id="level-display">1</span></div>
    <div><span class="label">💀 敌方剩余</span><span class="value" id="enemies-display">20</span></div>
    <div><span class="label">❤️ 生命</span><span class="lives value" id="lives-display">3</span></div>
  </div>
  <canvas id="game-canvas" width="780" height="600"></canvas>
  <div id="controls-info">
    <span>W A S D</span> 或 <span>↑ ← ↓ →</span> 移动 &nbsp;|&nbsp;
    <span>空格</span> 射击 &nbsp;|&nbsp;
    <span>P</span> 暂停 &nbsp;|&nbsp;
    <span>R</span> 重新开始
  </div>
</div>

<script>
// ============ 坦克大战 - Tank Battle ============

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// --- DOM 元素 ---
const scoreDisplay = document.getElementById('score-display');
const levelDisplay = document.getElementById('level-display');
const enemiesDisplay = document.getElementById('enemies-display');
const livesDisplay = document.getElementById('lives-display');

// --- 常量 ---
const TILE_SIZE = 30;
const COLS = 26;  // 780 / 30
const ROWS = 20;  // 600 / 30
const TANK_SPEED = 2;
const BULLET_SPEED = 4;
const ENEMY_SPEED = 1.2;
const ENEMY_SHOOT_COOLDOWN = 60;
const PLAYER_SHOOT_COOLDOWN = 20;
const INVINCIBLE_TIME = 120;
const ENEMY_SPAWN_COOLDOWN = 90;
const MAX_ENEMIES_ON_SCREEN = 4;

// --- 音效系统 ---
let audioCtx = null;
try {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
} catch(e) {
  // Audio not supported, sounds will be silent
}

function playSound(freq, type, duration, vol = 0.1) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function sfxShoot() { playSound(200, 'square', 0.1, 0.05); }
function sfxHit() { playSound(60, 'sawtooth', 0.2, 0.05); }
function sfxExplosion() { playSound(30, 'sawtooth', 0.4, 0.1); }
function sfxPowerUp() { playSound(600, 'square', 0.15, 0.05); playSound(800, 'square', 0.15, 0.08); }
function sfxGameOver() { playSound(40, 'sawtooth', 0.8, 0.3); }
function sfxLevelUp() { playSound(400, 'square', 0.1, 0.05); playSound(500, 'square', 0.1, 0.05); playSound(700, 'square', 0.15, 0.1); }

// --- 地图定义 ---
// 0=空地, 1=砖墙, 2=钢铁, 3=水, 4=树丛, 5=基地
const MAPS = [
  // 关卡1
  [
    "00000000000000000000000000",
    "00000000000000000000000000",
    "00110001100000000110001100",
    "00110001100000000110001100",
    "00110001100000000110001100",
    "00000000000110000000000000",
    "00000000000110000000000000",
    "01100000000110000000000110",
    "00011000000000000001100000",
    "00001100000000000011000000",
    "00000000001100110000000000",
    "00000000001100110000000000",
    "00001100000000000011000000",
    "00011000000000000001100000",
    "01100000000000000000000110",
    "00000000000000110000000000",
    "00000000000000110000000000",
    "00110001100000110011000110",
    "00110001100000000110001100",
    "00000550000000000000055000",
  ],
  // 关卡2
  [
    "02000200000000000002000200",
    "00000000011000110000000000",
    "00001100000000000000110000",
    "01000100001100110001000100",
    "01000100000000000001000100",
    "00000000000100100000000000",
    "00001100000100100000110000",
    "00000000001100110000000000",
    "00000000000000000000000000",
    "00100011000000000110001000",
    "00010001001000100100010000",
    "00010001001000100100010000",
    "00100011000000000110001000",
    "00000000000000000000000000",
    "00000000001100110000000000",
    "00001100000100100000110000",
    "00000000000100100000000000",
    "01000100000000000001000100",
    "01000100001100110001000100",
    "00000550000000000000055000",
  ],
  // 关卡3
  [
    "02020200000000000002020200",
    "01100110011001100110011001",
    "00000000000000000000000000",
    "00110000001100110000001100",
    "00001100000000000000110000",
    "00000000000100100000000000",
    "01100011000100100011000110",
    "00000000001100110000000000",
    "00000011000000000011000000",
    "01000000101000001010000001",
    "01000000101000001010000001",
    "00000011000000000011000000",
    "00000000001100110000000000",
    "01100011000100100011000110",
    "00000000000100100000000000",
    "00001100000000000000110000",
    "00110000001100110000001100",
    "00000000000000000000000000",
    "01100110011001100110011001",
    "00000550000000055000000000",
  ],
];

// --- 游戏状态 ---
let score = 0;
let level = 1;
let lives = 3;
let enemiesRemaining = 20;
let gameRunning = true;
let gamePaused = false;
let gameOver = false;
let levelComplete = false;
let playerInvincible = 0;

// --- 输入处理 ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P') {
    gamePaused = !gamePaused;
  }
  if (e.key === 'r' || e.key === 'R') {
    restartGame();
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  e.preventDefault();
});

// --- 地图数据 ---
let mapData = [];

function loadMap(mapArray) {
  mapData = [];
  for (let row = 0; row < ROWS; row++) {
    mapData[row] = [];
    for (let col = 0; col < COLS; col++) {
      const char = mapArray[row] ? mapArray[row][col] || '0' : '0';
      mapData[row][col] = parseInt(char);
    }
  }
}

// --- 游戏对象 ---
class Tank {
  constructor(x, y, dir, color, speed, isPlayer = false) {
    this.x = x;
    this.y = y;
    this.dir = dir; // 0=上 1=右 2=下 3=左
    this.color = color;
    this.speed = speed;
    this.isPlayer = isPlayer;
    this.width = TILE_SIZE - 4;
    this.height = TILE_SIZE - 4;
    this.shootCooldown = 0;
    this.alive = true;
    this.ai_changeDir = 0;
    this.ai_shootTimer = 0;
  }

  getCenterX() { return this.x + this.width / 2; }
  getCenterY() { return this.y + this.height / 2; }

  draw() {
    const cx = this.x + this.width / 2;
    const cy = this.y + this.height / 2;
    const hw = this.width / 2;
    const hh = this.height / 2;

    ctx.save();
    ctx.translate(cx, cy);

    // 闪烁效果（无敌时）
    if (this.isPlayer && playerInvincible > 0 && Math.floor(playerInvincible / 6) % 2 === 0) {
      ctx.restore();
      return;
    }

    const angle = this.dir * Math.PI / 2;
    ctx.rotate(angle);

    // 履带
    ctx.fillStyle = '#333';
    ctx.fillRect(-hw, -hh, hw * 0.35, hh * 2);
    ctx.fillRect(hw * 0.65, -hh, hw * 0.35, hh * 2);

    // 车身
    const bodyColor = this.isPlayer ? '#4CAF50' : this.color;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-hw + 4, -hh + 3, hw * 2 - 8, hh * 2 - 6);

    // 炮管
    ctx.fillStyle = '#222';
    ctx.fillRect(-2, -hh - 4, 4, hh + 4);

    // 炮塔
    const turretColor = this.isPlayer ? '#2E7D32' : this.darkenColor(bodyColor, 30);
    ctx.fillStyle = turretColor;
    ctx.beginPath();
    ctx.arc(0, 0, hw * 0.45, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  darkenColor(hex, percent) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.max(0, (num >> 16) - percent);
    const g = Math.max(0, ((num >> 8) & 0xFF) - percent);
    const b = Math.max(0, (num & 0xFF) - percent);
    return `rgb(${r},${g},${b})`;
  }

  move(dx, dy) {
    const newX = this.x + dx;
    const newY = this.y + dy;
    if (this.canMoveTo(newX, newY)) {
      this.x = newX;
      this.y = newY;
      return true;
    }
    return false;
  }

  moveForward() {
    const moves = [
      { dx: 0, dy: -this.speed },  // 上
      { dx: this.speed, dy: 0 },   // 右
      { dx: 0, dy: this.speed },   // 下
      { dx: -this.speed, dy: 0 },  // 左
    ];
    const m = moves[this.dir];
    return this.move(m.dx, m.dy);
  }

  canMoveTo(x, y) {
    // 边界检查
    if (x < 0 || y < 0 || x + this.width > canvas.width || y + this.height > canvas.height) {
      return false;
    }

    // 地图碰撞检查
    const points = [
      { x: x, y: y },
      { x: x + this.width, y: y },
      { x: x, y: y + this.height },
      { x: x + this.width, y: y + this.height },
      { x: x + this.width / 2, y: y + this.height / 2 },
    ];

    for (const p of points) {
      const col = Math.floor(p.x / TILE_SIZE);
      const row = Math.floor(p.y / TILE_SIZE);
      if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
        const tile = mapData[row][col];
        if (tile === 1 || tile === 2 || tile === 5) return false; // 砖墙、钢铁、基地
        if (tile === 3) return false; // 水
      }
    }

    // 与其他坦克碰撞
    for (const tank of allTanks()) {
      if (tank === this || !tank.alive) continue;
      if (rectCollide(x, y, this.width, this.height, tank.x, tank.y, tank.width, tank.height)) {
        return false;
      }
    }

    return true;
  }

  shoot() {
    if (this.shootCooldown > 0) return null;
    this.shootCooldown = this.isPlayer ? PLAYER_SHOOT_COOLDOWN : ENEMY_SHOOT_COOLDOWN;
    const cx = this.getCenterX();
    const cy = this.getCenterY();
    const dirs = [
      { dx: 0, dy: -1 },  // 上
      { dx: 1, dy: 0 },   // 右
      { dx: 0, dy: 1 },   // 下
      { dx: -1, dy: 0 },  // 左
    ];
    const d = dirs[this.dir];
    const bullet = new Bullet(cx - 3, cy - 3, d.dx * BULLET_SPEED, d.dy * BULLET_SPEED, this.isPlayer);
    sfxShoot();
    return bullet;
  }
}

class Bullet {
  constructor(x, y, vx, vy, isPlayer) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.width = 6;
    this.height = 6;
    this.isPlayer = isPlayer;
    this.alive = true;
  }

  draw() {
    ctx.fillStyle = this.isPlayer ? '#ffeb3b' : '#ff5252';
    ctx.shadowColor = this.isPlayer ? '#ffeb3b' : '#ff5252';
    ctx.shadowBlur = 6;
    ctx.fillRect(this.x, this.y, this.width, this.height);
    ctx.shadowBlur = 0;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    // 边界
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.alive = false;
      return;
    }

    // 地图碰撞
    const cx = this.x + this.width / 2;
    const cy = this.y + this.height / 2;
    const col = Math.floor(cx / TILE_SIZE);
    const row = Math.floor(cy / TILE_SIZE);

    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      const tile = mapData[row][col];
      if (tile === 1) {
        // 砖墙：摧毁
        mapData[row][col] = 0;
        this.alive = false;
        sfxHit();
        spawnDestroyEffect(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#cc6600');
        return;
      }
      if (tile === 2) {
        // 钢铁：子弹消失
        this.alive = false;
        sfxHit();
        spawnDestroyEffect(this.x, this.y, '#888');
        return;
      }
      if (tile === 5) {
        // 基地被摧毁 = 游戏结束
        mapData[row][col] = 0;
        this.alive = false;
        sfxExplosion();
        triggerGameOver();
        return;
      }
    }

    // 坦克碰撞
    for (const tank of allTanks()) {
      if (!tank.alive) continue;
      if (this.isPlayer && tank.isPlayer) continue;
      if (!this.isPlayer && !tank.isPlayer) continue;

      if (rectCollide(this.x, this.y, this.width, this.height, tank.x, tank.y, tank.width, tank.height)) {
        this.alive = false;
        if (tank.isPlayer) {
          if (playerInvincible <= 0) {
            tank.alive = false;
            sfxExplosion();
            spawnDestroyEffect(tank.getCenterX(), tank.getCenterY(), '#4CAF50');
            lives--;
            updateHUD();
            if (lives <= 0) {
              triggerGameOver();
            } else {
              respawnPlayer();
            }
          }
        } else {
          tank.alive = false;
          sfxExplosion();
          spawnDestroyEffect(tank.getCenterX(), tank.getCenterY(), tank.color);
          score += 100;
          enemiesRemaining--;
          updateHUD();

          // 随机掉落道具
          if (Math.random() < 0.15) {
            spawnPowerUp(tank.getCenterX(), tank.getCenterY());
          }
        }
        return;
      }
    }

    // 子弹互撞
    for (const bullet of bullets) {
      if (bullet === this || !bullet.alive) continue;
      if (bullet.isPlayer === this.isPlayer) continue;
      if (rectCollide(this.x, this.y, this.width, this.height, bullet.x, bullet.y, bullet.width, bullet.height)) {
        this.alive = false;
        bullet.alive = false;
        return;
      }
    }
  }
}

class PowerUp {
  constructor(x, y, type) {
    this.x = x - TILE_SIZE / 2;
    this.y = y - TILE_SIZE / 2;
    this.width = TILE_SIZE;
    this.height = TILE_SIZE;
    this.type = type; // 'life', 'star', 'shield', 'bomb'
    this.alive = true;
    this.timer = 600; // 10秒后消失
  }

  draw() {
    this.timer--;
    if (this.timer < 60 && Math.floor(this.timer / 8) % 2 === 0) return;

    const cx = this.x + this.width / 2;
    const cy = this.y + this.height / 2;

    ctx.fillStyle = '#000';
    ctx.fillRect(this.x - 1, this.y - 1, this.width + 2, this.height + 2);
    ctx.fillStyle = '#333';
    ctx.fillRect(this.x, this.y, this.width, this.height);

    ctx.font = '20px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    switch (this.type) {
      case 'life':
        ctx.fillStyle = '#ff4444';
        ctx.fillText('❤️', cx, cy);
        break;
      case 'star':
        ctx.fillStyle = '#ffcc00';
        ctx.fillText('⭐', cx, cy);
        break;
      case 'shield':
        ctx.fillStyle = '#4488ff';
        ctx.fillText('🛡️', cx, cy);
        break;
      case 'bomb':
        ctx.fillStyle = '#ff8800';
        ctx.fillText('💣', cx, cy);
        break;
    }
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = (Math.random() - 0.5) * 5;
    this.life = 20 + Math.random() * 15;
    this.maxLife = this.life;
  }

  draw() {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
    ctx.globalAlpha = 1;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
  }
}

// --- 游戏对象池 ---
let player = null;
let enemies = [];
let bullets = [];
let powerUps = [];
let particles = [];
let enemySpawnTimer = 0;

function allTanks() {
  return [player, ...enemies].filter(t => t && t.alive);
}

function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// --- 特效 ---
function spawnDestroyEffect(x, y, color) {
  for (let i = 0; i < 12; i++) {
    particles.push(new Particle(x, y, color));
  }
}

function spawnPowerUp(x, y) {
  const types = ['life', 'star', 'shield', 'bomb'];
  const weights = [0.3, 0.3, 0.25, 0.15];
  const r = Math.random();
  let cumulative = 0;
  let type = 'star';
  for (let i = 0; i < types.length; i++) {
    cumulative += weights[i];
    if (r <= cumulative) { type = types[i]; break; }
  }
  powerUps.push(new PowerUp(x, y, type));
}

// --- 玩家重生 ---
function respawnPlayer() {
  player = new Tank(6 * TILE_SIZE + 2, 18 * TILE_SIZE + 2, 0, '#4CAF50', TANK_SPEED, true);
  playerInvincible = INVINCIBLE_TIME;
}

// --- 生成敌人 ---
function spawnEnemy() {
  const spawnPoints = [
    { x: 0, y: 0, dir: 2 },
    { x: 12 * TILE_SIZE, y: 0, dir: 1 },
    { x: 25 * TILE_SIZE, y: 0, dir: 2 },
  ];
  const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
  const enemyColors = ['#f44336', '#ff9800', '#9c27b0', '#e91e63', '#00bcd4', '#795548'];
  const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];

  const tank = new Tank(sp.x + 2, sp.y + 2, 2, color, ENEMY_SPEED, false);
  if (tank.canMoveTo(tank.x, tank.y)) {
    enemies.push(tank);
  }
}

// --- AI ---
function updateEnemyAI(enemy) {
  // 随机改变方向
  enemy.ai_changeDir--;
  if (enemy.ai_changeDir <= 0) {
    enemy.dir = Math.floor(Math.random() * 4);
    enemy.ai_changeDir = 30 + Math.floor(Math.random() * 90);
  }

  // 如果前方不能移动，改变方向
  if (!enemy.canMoveTo(
    enemy.x + (enemy.dir === 1 ? enemy.speed : enemy.dir === 3 ? -enemy.speed : 0),
    enemy.y + (enemy.dir === 2 ? enemy.speed : enemy.dir === 0 ? -enemy.speed : 0)
  )) {
    enemy.dir = Math.floor(Math.random() * 4);
    enemy.ai_changeDir = 20 + Math.floor(Math.random() * 40);
  }

  enemy.moveForward();

  // 射击
  enemy.ai_shootTimer++;
  if (enemy.ai_shootTimer >= ENEMY_SHOOT_COOLDOWN + Math.floor(Math.random() * 60)) {
    enemy.ai_shootTimer = 0;
    const bullet = enemy.shoot();
    if (bullet) bullets.push(bullet);
  }
}

// --- 道具拾取 ---
function checkPowerUpCollision() {
  for (const pu of powerUps) {
    if (!pu.alive) continue;
    if (rectCollide(player.x, player.y, player.width, player.height, pu.x, pu.y, pu.width, pu.height)) {
      pu.alive = false;
      sfxPowerUp();
      switch (pu.type) {
        case 'life':
          lives = Math.min(lives + 1, 9);
          break;
        case 'star':
          score += 300;
          // 暂时加速
          player.speed = TANK_SPEED * 1.5;
          setTimeout(() => { if (player) player.speed = TANK_SPEED; }, 8000);
          break;
        case 'shield':
          playerInvincible = Math.max(playerInvincible, 300);
          break;
        case 'bomb':
          // 清除屏幕上所有敌人
          for (const e of enemies) {
            if (e.alive) {
              e.alive = false;
              spawnDestroyEffect(e.getCenterX(), e.getCenterY(), e.color);
              score += 100;
              enemiesRemaining--;
            }
          }
          break;
      }
      updateHUD();
    }
  }
}

// --- 游戏结束 ---
function triggerGameOver() {
  gameOver = true;
  gameRunning = false;
  sfxGameOver();
}

// --- 关卡完成检查 ---
function checkLevelComplete() {
  if (enemiesRemaining <= 0 && enemies.filter(e => e.alive).length === 0) {
    levelComplete = true;
    gameRunning = false;
    sfxLevelUp();
  }
}

// --- HUD 更新 ---
function updateHUD() {
  scoreDisplay.textContent = score;
  levelDisplay.textContent = level;
  enemiesDisplay.textContent = enemiesRemaining;
  livesDisplay.textContent = '❤️'.repeat(Math.max(0, lives));
}

// --- 地图绘制 ---
function drawMap() {
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const x = col * TILE_SIZE;
      const y = row * TILE_SIZE;
      const tile = mapData[row][col];

      switch (tile) {
        case 0: break; // 空地
        case 1: // 砖墙
          ctx.fillStyle = '#cc6600';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#993300';
          ctx.fillRect(x + 1, y + 1, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
          ctx.fillRect(x + TILE_SIZE / 2 + 1, y + 1, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
          ctx.fillRect(x + 1, y + TILE_SIZE / 2 + 1, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
          ctx.fillRect(x + TILE_SIZE / 2 + 1, y + TILE_SIZE / 2 + 1, TILE_SIZE / 2 - 2, TILE_SIZE / 2 - 2);
          ctx.strokeStyle = '#884400';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
          break;
        case 2: // 钢铁
          ctx.fillStyle = '#888';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#aaa';
          ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
          ctx.fillStyle = '#666';
          ctx.fillRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
          break;
        case 3: // 水
          ctx.fillStyle = '#1565C0';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#1E88E5';
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(x + 3 + i * 10, y + 5, 5, 5);
            ctx.fillRect(x + 8 + i * 10, y + 15, 5, 5);
          }
          break;
        case 4: // 树丛
          ctx.fillStyle = '#2E7D32';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#388E3C';
          ctx.beginPath();
          ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 2, 0, Math.PI * 2);
          ctx.fill();
          break;
        case 5: // 基地
          ctx.fillStyle = '#333';
          ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#FFD700';
          ctx.beginPath();
          const bCx = x + TILE_SIZE / 2;
          const bCy = y + TILE_SIZE / 2;
          ctx.moveTo(bCx, bCy - 8);
          ctx.lineTo(bCx + 7, bCy + 5);
          ctx.lineTo(bCx - 7, bCy + 5);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#FFEB3B';
          ctx.beginPath();
          ctx.arc(bCx, bCy - 2, 5, 0, Math.PI * 2);
          ctx.fill();
          break;
      }
    }
  }
}

// --- 主循环 ---
function update() {
  if (!gameRunning || gamePaused || gameOver) return;

  // 无敌时间递减
  if (playerInvincible > 0) playerInvincible--;

  // 玩家射击冷却
  if (player && player.shootCooldown > 0) player.shootCooldown--;

  // 敌人冷却
  for (const e of enemies) {
    if (e.shootCooldown > 0) e.shootCooldown--;
  }

  // 生成敌人
  if (enemiesRemaining > 0 && enemies.filter(e => e.alive).length < MAX_ENEMIES_ON_SCREEN) {
    enemySpawnTimer--;
    if (enemySpawnTimer <= 0) {
      spawnEnemy();
      enemySpawnTimer = ENEMY_SPAWN_COOLDOWN;
    }
  }

  // 玩家输入
  if (player && player.alive) {
    let moved = false;
    if (keys['w'] || keys['W'] || keys['ArrowUp']) {
      player.dir = 0;
      moved = player.moveForward();
    } else if (keys['s'] || keys['S'] || keys['ArrowDown']) {
      player.dir = 2;
      moved = player.moveForward();
    } else if (keys['a'] || keys['A'] || keys['ArrowLeft']) {
      player.dir = 3;
      moved = player.moveForward();
    } else if (keys['d'] || keys['D'] || keys['ArrowRight']) {
      player.dir = 1;
      moved = player.moveForward();
    }

    if (keys[' '] || keys['Spacebar']) {
      const bullet = player.shoot();
      if (bullet) bullets.push(bullet);
    }
  }

  // 更新敌人
  for (const e of enemies) {
    if (e.alive) updateEnemyAI(e);
  }

  // 更新子弹
  for (const bullet of bullets) {
    if (bullet.alive) bullet.update();
  }
  bullets = bullets.filter(b => b.alive);

  // 更新粒子
  for (const p of particles) p.update();
  particles = particles.filter(p => p.life > 0);

  // 更新道具
  for (const pu of powerUps) {
    // timer counts in draw()
    if (pu.timer <= 0) pu.alive = false;
  }
  powerUps = powerUps.filter(pu => pu.alive);

  // 道具拾取
  checkPowerUpCollision();

  // 清理死亡敌人
  enemies = enemies.filter(e => e.alive);

  // 检查关卡完成
  checkLevelComplete();

  // 检查玩家是否还活着
  if (player && !player.alive && lives <= 0) {
    triggerGameOver();
  }
}

function draw() {
  // 清屏
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 绘制网格线
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= canvas.width; x += TILE_SIZE) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= canvas.height; y += TILE_SIZE) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // 绘制地图
  drawMap();

  // 绘制道具
  for (const pu of powerUps) {
    if (pu.alive) pu.draw();
  }

  // 绘制子弹
  for (const bullet of bullets) {
    if (bullet.alive) bullet.draw();
  }

  // 绘制敌人
  for (const e of enemies) {
    if (e.alive) e.draw();
  }

  // 绘制玩家
  if (player && player.alive) player.draw();

  // 绘制粒子
  for (const p of particles) {
    p.draw();
  }

  // 绘制树丛覆盖层（在坦克上面）
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      if (mapData[row][col] === 4) {
        const x = col * TILE_SIZE;
        const y = row * TILE_SIZE;
        ctx.fillStyle = 'rgba(46,125,50,0.5)';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = 'rgba(56,142,60,0.5)';
        ctx.beginPath();
        ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // 暂停提示
  if (gamePaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '48px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停中', canvas.width / 2, canvas.height / 2);
    ctx.font = '20px "Courier New"';
    ctx.fillText('按 P 继续', canvas.width / 2, canvas.height / 2 + 40);
  }

  // 关卡完成
  if (levelComplete) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffcc00';
    ctx.font = '48px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(`🏆 关卡 ${level} 完成!`, canvas.width / 2, canvas.height / 2);
    ctx.fillStyle = '#fff';
    ctx.font = '24px "Courier New"';
    ctx.fillText('按 ENTER 进入下一关', canvas.width / 2, canvas.height / 2 + 50);
  }

  // 游戏结束
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff4444';
    ctx.font = '60px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillStyle = '#ffcc00';
    ctx.font = '28px "Courier New"';
    ctx.fillText(`最终得分: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
    ctx.fillStyle = '#fff';
    ctx.font = '20px "Courier New"';
    ctx.fillText('按 R 重新开始', canvas.width / 2, canvas.height / 2 + 80);
  }
}

// --- 进入下一关 ---
function nextLevel() {
  level++;
  if (level > MAPS.length) {
    level = 1; // 循环
  }
  enemiesRemaining = 15 + level * 5;
  levelComplete = false;
  gameRunning = true;

  const mapIndex = (level - 1) % MAPS.length;
  loadMap(MAPS[mapIndex]);
  enemies = [];
  bullets = [];
  powerUps = [];
  particles = [];
  enemySpawnTimer = 60;
  respawnPlayer();
  updateHUD();
}

// --- 下一关监听 ---
window.addEventListener('keydown', function nextLevelHandler(e) {
  if (e.key === 'Enter' && levelComplete && !gameOver) {
    nextLevel();
  }
});

// --- 重新开始 ---
function restartGame() {
  score = 0;
  level = 1;
  lives = 3;
  enemiesRemaining = 20;
  gameRunning = true;
  gamePaused = false;
  gameOver = false;
  levelComplete = false;
  playerInvincible = 0;
  enemies = [];
  bullets = [];
  powerUps = [];
  particles = [];
  enemySpawnTimer = 60;
  loadMap(MAPS[0]);
  respawnPlayer();
  updateHUD();
}

// --- 初始化 ---
function init() {
  loadMap(MAPS[0]);
  respawnPlayer();
  updateHUD();
  enemySpawnTimer = 60;
}

// --- 游戏循环 ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

init();
gameLoop();
</script>
